<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" />
      <stop offset="100%" stop-color="#0055ff" />
    </linearGradient>
    <linearGradient id="secondary-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e91e63" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
  </defs>
  
  <!-- Sleek Dark Background matching the site -->
  <rect width="512" height="512" rx="120" fill="#010205" />
  
  <!-- Outer glowing curve of the D -->
  <path d="M 160,110 h 100 c 130,0 170,70 170,146 c 0,76 -40,146 -170,146 h -100 z" 
        fill="none" 
        stroke="url(#primary-grad)" 
        stroke-width="55" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Intense inner structure of the D -->
  <path d="M 180,140 h 70 c 90,0 110,50 110,116 c 0,66 -20,116 -110,116 h -70 z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="15" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- The vertical spine of the D -->
  <line x1="160" y1="110" x2="160" y2="402" 
        stroke="url(#secondary-grad)" 
        stroke-width="55" 
        stroke-linecap="round"/>
        
  <line x1="160" y1="130" x2="160" y2="382" 
        stroke="#ffffff" 
        stroke-width="15" 
        stroke-linecap="round"/>
</svg>
